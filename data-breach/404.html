<!DOCTYPE html>
<html>
<head>
<script>
  // GitHub Pages SPA redirect: preserve path + hash for recipient links
  var segments = location.pathname.split('/').filter(Boolean);
  var base = '/' + segments[0];
  var rest = segments.slice(1).join('/');
  if (rest) {
    location.replace(base + '/?p=' + rest + location.hash);
  } else {
    location.replace(base + '/' + location.hash);
  }
</script>
</head>
</html>
