<!DOCTYPE html>
<html>
<head>
<script>
  // GitHub Pages SPA redirect: preserve path + hash for recipient links
  var segments = location.pathname.split('/').filter(Boolean);
  if (segments.length > 0) {
    var rowId = segments[segments.length - 1];
    location.replace('/?p=' + rowId + location.hash);
  } else {
    location.replace('/' + location.hash);
  }
</script>
</head>
</html>
