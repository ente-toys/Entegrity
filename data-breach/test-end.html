<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Complete — Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Comic+Neue:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
</style>
</head>
<body>
<script>
// Mock data
const allTimes = {1:'2.0',2:'0.3',3:'0.0',4:'0.8',5:'5.6'};
const allDeaths = {5:1};
const totalDeaths = [1,2,3,4,5].reduce((sum, i) => sum + (allDeaths[i] || 0), 0);

const endDiv = document.createElement('div');
endDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#ffdd44;font-family:Chelsea Market,Comic Neue,cursive;overflow:hidden;';

const starCanvas = document.createElement('canvas');
starCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
endDiv.appendChild(starCanvas);
const sCtx = starCanvas.getContext('2d');
const endStars = [];
starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight;
for (let i = 0; i < 80; i++) endStars.push({ x: Math.random() * starCanvas.width, y: Math.random() * starCanvas.height, r: Math.random() * 1.5 + 0.5, a: Math.random(), s: Math.random() * 0.02 + 0.005, d: Math.random() > 0.5 ? 1 : -1 });
function drawEndStars() {
  sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  endStars.forEach(s => { s.a += s.s * s.d; if (s.a >= 1 || s.a <= 0.1) s.d *= -1; sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); sCtx.fillStyle = 'rgba(255,255,255,' + (s.a * 0.4) + ')'; sCtx.fill(); });
  if (endDiv.parentElement) requestAnimationFrame(drawEndStars);
}
drawEndStars();

const pCanvas = document.createElement('canvas');
pCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
endDiv.appendChild(pCanvas);
const pCtx2 = pCanvas.getContext('2d');
const endParticles = [];
pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
for (let i = 0; i < 25; i++) endParticles.push({ x: Math.random() * pCanvas.width, y: Math.random() * pCanvas.height, vy: -(Math.random() * 0.3 + 0.1), vx: (Math.random() - 0.5) * 0.3, r: Math.random() * 2 + 1, a: Math.random() * 0.3 });
function drawEndParticles() {
  pCtx2.clearRect(0, 0, pCanvas.width, pCanvas.height);
  endParticles.forEach(p => { p.y += p.vy; p.x += p.vx; if (p.y < -10) { p.y = pCanvas.height + 10; p.x = Math.random() * pCanvas.width; } const grad = pCtx2.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r); grad.addColorStop(0, 'rgba(255,221,68,' + p.a + ')'); grad.addColorStop(1, 'rgba(255,221,68,0)'); pCtx2.beginPath(); pCtx2.arc(p.x, p.y, p.r, 0, Math.PI * 2); pCtx2.fillStyle = grad; pCtx2.fill(); });
  if (endDiv.parentElement) requestAnimationFrame(drawEndParticles);
}
drawEndParticles();

const totalTime = [1,2,3,4,5].reduce((sum, i) => sum + (parseFloat(allTimes[i]) || 0), 0).toFixed(1);
const perfectRun = totalDeaths === 0;
const contentDiv = document.createElement('div');
contentDiv.style.cssText = 'position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:20px;max-width:500px;width:100%;';
contentDiv.innerHTML = `
  <style>
    @keyframes qcFadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes qcGlow { 0%,100% { text-shadow:0 0 20px rgba(255,221,68,0.3),0 0 40px rgba(255,221,68,0.1); } 50% { text-shadow:0 0 30px rgba(255,221,68,0.5),0 0 60px rgba(255,221,68,0.2),0 0 80px rgba(255,221,68,0.1); } }
    @keyframes qcPop { 0% { transform:scale(0);opacity:0; } 60% { transform:scale(1.2); } 100% { transform:scale(1);opacity:1; } }
    .qc-title { font-size:36px;font-weight:bold;letter-spacing:4px;text-transform:uppercase;animation:qcGlow 3s ease-in-out infinite, qcFadeUp 0.8s ease-out both; }
    .qc-sub { font-size:14px;color:#8899aa;margin-top:8px;letter-spacing:2px;animation:qcFadeUp 0.8s ease-out 0.2s both; }
    .qc-line { width:60px;height:2px;background:linear-gradient(90deg,transparent,#ffdd44,transparent);margin:20px 0;animation:qcFadeUp 0.8s ease-out 0.3s both; }
    .qc-stats { display:flex;flex-direction:column;gap:6px;width:100%;max-width:320px;animation:qcFadeUp 0.8s ease-out 0.4s both; }
    .qc-row { display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);transition:background 0.3s,border-color 0.3s; }
    .qc-row:hover { background:rgba(255,255,255,0.06);border-color:rgba(255,221,68,0.2); }
    .qc-lbl { font-size:13px;color:#8899aa;font-family:Comic Neue,cursive; }
    .qc-val { font-size:14px;font-weight:700;color:#ffdd44;font-family:Chelsea Market,cursive; }
    .qc-death { font-size:11px;color:#ff6644;margin-left:6px;font-family:Comic Neue,cursive; }
    .qc-total { display:flex;justify-content:space-between;width:100%;max-width:320px;margin-top:12px;padding:10px 16px;border-radius:8px;background:rgba(255,221,68,0.05);border:1px solid rgba(255,221,68,0.15);animation:qcFadeUp 0.8s ease-out 0.6s both; }
    .qc-badge { display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;animation:qcPop 0.5s ease-out 0.8s both; }
    .qc-badge-ok { background:rgba(68,221,102,0.12);border:1px solid rgba(68,221,102,0.3);color:#44dd66; }
    .qc-badge-dead { background:rgba(255,102,68,0.08);border:1px solid rgba(255,102,68,0.15);color:#ff8866; }
    .qc-cta { margin-top:28px;padding:20px 28px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;max-width:380px;text-align:center;animation:qcFadeUp 0.8s ease-out 1s both;backdrop-filter:blur(10px);transition:border-color 0.3s,background 0.3s; }
    .qc-cta:hover { border-color:rgba(165,197,8,0.3);background:rgba(255,255,255,0.05); }
    .qc-btn { padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;font-family:Comic Neue,cursive;transition:transform 0.2s,box-shadow 0.2s;display:inline-block; }
    .qc-btn:hover { transform:translateY(-2px); }
    .qc-btn-p { background:linear-gradient(135deg,#a5c508,#8aad00);color:#050510;box-shadow:0 4px 15px rgba(165,197,8,0.2); }
    .qc-btn-p:hover { box-shadow:0 6px 25px rgba(165,197,8,0.35); }
    .qc-btn-s { background:transparent;border:1px solid rgba(165,197,8,0.5);color:#a5c508; }
    .qc-btn-s:hover { background:rgba(165,197,8,0.08);box-shadow:0 4px 15px rgba(165,197,8,0.1); }
    .qc-reveal { font-size:12px;color:#556;margin-top:24px;cursor:pointer;font-family:Comic Neue,cursive;transition:color 0.3s;animation:qcFadeUp 0.8s ease-out 1.2s both;letter-spacing:1px; }
    .qc-reveal:hover { color:#ffdd44; }
  </style>
  <div class="qc-title">Quest Complete</div>
  <div class="qc-sub">All encryption keys recovered</div>
  <div class="qc-line"></div>
  <div class="qc-stats">
    ${[1,2,3,4,5].map(i => '<div class="qc-row"><span class="qc-lbl">Level ' + i + '</span><span><span class="qc-val">' + (allTimes[i] ? allTimes[i] + 's' : '--') + '</span>' + (allDeaths[i] ? '<span class="qc-death">' + allDeaths[i] + ' death' + (allDeaths[i] > 1 ? 's' : '') + '</span>' : '') + '</span></div>').join('')}
  </div>
  <div class="qc-total">
    <span class="qc-lbl">Total Time</span>
    <span class="qc-val">${totalTime}s</span>
  </div>
  ${perfectRun
    ? '<div class="qc-badge qc-badge-ok">&#9733; PERFECT RUN — Zero Deaths &#9733;</div>'
    : '<div class="qc-badge qc-badge-dead">&#9760; ' + totalDeaths + ' death' + (totalDeaths > 1 ? 's' : '') + '</div>'}
  <div class="qc-btn qc-btn-p" style="margin-top:28px;cursor:pointer;font-size:15px;padding:14px 36px;animation:qcFadeUp 0.8s ease-out 0.9s both">&#x1F512; Reveal the Secret</div>
  <div class="qc-cta" style="margin-top:24px">
    <div style="font-size:13px;color:#8899aa;margin-bottom:6px;font-family:Comic Neue,cursive;line-height:1.5">You just defeated trackers, cookies, and The Algorithm.</div>
    <div style="font-size:14px;color:#dde;margin-bottom:16px;font-family:Comic Neue,cursive;line-height:1.5">Now do it for real — protect your data with <strong style="color:#a5c508">Ente</strong>.</div>
    <a href="https://ente.io" target="_blank" class="qc-btn qc-btn-s">Ente</a>
  </div>
`;
endDiv.appendChild(contentDiv);
document.body.appendChild(endDiv);
</script>
</body>
</html>
